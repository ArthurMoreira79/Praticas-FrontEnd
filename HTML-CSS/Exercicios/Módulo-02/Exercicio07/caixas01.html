<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modelo de Caixas</title>
    <style>
        h1{/*box-level*/

            background-color: lightgray;
            /*Box-Sizing*/
            height: 300px;
            width: 300px;
            
            /*
            ShortHand Border
            width, style, color;
            border-width: 10px;
            border-style: solid;
            border-color: darkgray;
            */

            border: 10px solid darkgray;
            
            /*
            ShortHan Padding
            se todas as 4 forem iguais, posso informar o valor só uma vez
            padding-top: 10px;
            padding-right: 10px;
            padding-bottom: 10px;
            padding-left: 10px;
            */

            padding: 10px;
            
            /*
            ShortHand Margin
            margin-top: 20px;
            margin-right: 20px;
            margin-bottom: 40px;
            margin-left: 20px;
            */

            margin: 20px auto 20px auto;
            
            /*
            Shorthand Outline
            outline-width: 5px;
            outline-style: dashed;
            outline-color: red;
            */

            outline: 5px dashed red;
        }

        a{/*inline-level*/
            border-width: 5px;
            border-style: dashed;
            border-color: red;
        }
    </style>
</head>
<body>
    <h1>Exemplo de Caixa Box Level</h1>
    <p>Parágrafos também são exemplos de box-level, mas os <a href="#">links são exemplos de caisas inline-level</a>. Vamos ver como tudo isso funciona.</p>
</body>
</html>
